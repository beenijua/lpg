<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LPG 충전 기록</title>
<meta name="theme-color" content="#1D9E75">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="LPG 기록">
<link rel="manifest" href="/lpg/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: #1D9E75; --accent-light: #E1F5EE; --accent-mid: #5DCAA5; --accent-dark: #0F6E56;
    --bg: #f7f8f6; --surface: #ffffff; --surface2: #f2f4f2; --border: rgba(0,0,0,0.09);
    --text: #1a1c1a; --text2: #6b7068; --text3: #a0a59e;
    --red: #E24B4A; --red-light: #FCEBEB; --red-text: #A32D2D; --blue: #378ADD; --amber: #BA7517;
  }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  .app { max-width: 480px; margin: 0 auto; padding: 0 0 80px; min-height: 100vh; background: var(--bg); }
  .header { background: var(--accent); padding: 20px 20px 24px; position: relative; overflow: hidden; }
  .header::after { content: ''; position: absolute; right: -30px; bottom: -30px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.08); }
  .header::before { content: ''; position: absolute; right: 20px; top: -20px; width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.06); }
  .header-row { display: flex; align-items: center; gap: 12px; position: relative; z-index: 1; }
  .logo { width: 42px; height: 42px; background: rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo svg { width: 24px; height: 24px; fill: white; }
  .header h1 { font-size: 20px; font-weight: 700; color: white; letter-spacing: -0.3px; }
  .header-sub { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 2px; }
  .header-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 18px; position: relative; z-index: 1; }
  .h-stat { background: rgba(255,255,255,0.15); border-radius: 10px; padding: 10px 12px; }
  .h-stat .hl { font-size: 10px; color: rgba(255,255,255,0.7); margin-bottom: 3px; }
  .h-stat .hv { font-size: 16px; font-weight: 700; color: white; }
  .h-stat .hu { font-size: 10px; color: rgba(255,255,255,0.7); font-weight: 400; }
  .nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .nav-btn { flex: 1; padding: 12px 4px; border: none; background: transparent; font-size: 11px; font-weight: 500; color: var(--text2); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; border-bottom: 2px solid transparent; transition: all 0.18s; }
  .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .content { padding: 20px; }
  .section { display: none; }
  .section.active { display: block; }
  .form-card { background: var(--surface); border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 12px; }
  .form-card-title { font-size: 13px; font-weight: 700; color: var(--text2); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.06em; }
  .form-group { margin-bottom: 12px; }
  .form-group:last-child { margin-bottom: 0; }
  .form-group label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 5px; font-weight: 500; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-group input { width: 100%; height: 42px; border: 1.5px solid var(--border); border-radius: 10px; padding: 0 12px; font-size: 14px; color: var(--text); background: var(--surface2); font-family: 'Noto Sans KR', sans-serif; transition: border-color 0.15s; }
  .form-group input:focus { outline: none; border-color: var(--accent); background: white; }
  .form-group input[readonly] { color: var(--accent-dark); font-weight: 700; background: var(--accent-light); border-color: transparent; }
  .save-btn { width: 100%; height: 48px; background: var(--accent); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: background 0.15s, transform 0.1s; }
  .save-btn:hover { background: var(--accent-dark); }
  .save-btn:active { transform: scale(0.98); }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--surface); border-radius: 14px; padding: 14px 16px; border: 1px solid var(--border); }
  .stat-card.accent { background: var(--accent-light); border-color: transparent; }
  .stat-card .lbl { font-size: 11px; color: var(--text2); margin-bottom: 4px; font-weight: 500; }
  .stat-card.accent .lbl { color: var(--accent-dark); }
  .stat-card .val { font-size: 22px; font-weight: 700; color: var(--text); }
  .stat-card.accent .val { color: var(--accent-dark); }
  .stat-card .unit { font-size: 11px; color: var(--text2); font-weight: 400; }
  .chart-card { background: var(--surface); border-radius: 16px; padding: 16px; border: 1px solid var(--border); margin-bottom: 12px; }
  .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .chart-title { font-size: 13px; font-weight: 700; color: var(--text); }
  .chart-toggle { display: flex; gap: 5px; }
  .chart-btn { padding: 4px 10px; border: 1.5px solid var(--border); border-radius: 20px; font-size: 11px; cursor: pointer; background: transparent; color: var(--text2); font-family: 'Noto Sans KR', sans-serif; font-weight: 500; transition: all 0.15s; }
  .chart-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .chart-wrap { position: relative; width: 100%; height: 200px; }
  .tip-card { background: var(--accent-light); border-radius: 14px; padding: 14px 16px; border: 1px solid rgba(29,158,117,0.15); margin-bottom: 12px; }
  .tip-card .tip-title { font-size: 12px; font-weight: 700; color: var(--accent-dark); margin-bottom: 6px; }
  .tip-card .tip-body { font-size: 12px; color: var(--accent-dark); line-height: 1.8; }
  .tip-card strong { font-weight: 700; }
  .history-list { display: flex; flex-direction: column; gap: 8px; }
  .h-item { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; }
  .h-left .station { font-size: 14px; font-weight: 700; color: var(--text); }
  .h-left .memo { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .h-left .date { font-size: 11px; color: var(--text2); margin-top: 3px; }
  .h-right { text-align: right; }
  .h-right .amount { font-size: 15px; font-weight: 700; color: var(--text); }
  .h-right .detail { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .h-right .pprice { font-size: 12px; color: var(--accent-dark); margin-top: 2px; font-weight: 700; }
  .h-actions { display: flex; align-items: center; margin-left: 10px; }
  .del-btn { background: none; border: none; cursor: pointer; font-size: 14px; color: var(--text3); padding: 6px; border-radius: 8px; transition: all 0.15s; }
  .del-btn:hover { background: var(--red-light); color: var(--red); }
  .badge { display: inline-block; padding: 2px 6px; border-radius: 20px; font-size: 10px; font-weight: 700; margin-left: 5px; vertical-align: middle; }
  .badge-up { background: var(--red-light); color: var(--red-text); }
  .badge-dn { background: var(--accent-light); color: var(--accent-dark); }
  .empty { text-align: center; padding: 60px 0; color: var(--text2); font-size: 14px; line-height: 2; }
  .month-label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; padding: 4px 0 8px; }
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px); background: #1a1c1a; color: white; padding: 10px 20px; border-radius: 24px; font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .station-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
  .station-tab { padding: 7px 12px; border-radius: 99px; border: 1.5px solid var(--border); background: transparent; font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s; }
  .station-tab.active { background: var(--accent); border-color: var(--accent); color: white; }
  .edit-btn { background: none; border: none; cursor: pointer; font-size: 13px; color: var(--text3); padding: 6px; border-radius: 8px; transition: all 0.15s; }
  .edit-btn:hover { background: var(--accent-light); color: var(--accent-dark); }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 400; display: flex; align-items: flex-end; justify-content: center; }
  .overlay.hidden { display: none; }
  .modal { background: var(--surface); border-radius: 24px 24px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
  .modal-handle { width: 36px; height: 4px; border-radius: 99px; background: var(--border); margin: 0 auto 20px; }
  .modal-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
  .btn-primary { flex: 1; height: 48px; background: var(--accent); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
  .btn-secondary { flex: 1; height: 48px; background: var(--surface2); color: var(--text2); border: none; border-radius: 12px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-row">
      <div class="logo">
        <svg viewBox="0 0 24 24"><path d="M19.77 7.23l.01-.01-3.72-3.72L15 4.56l2.11 2.11c-.94.36-1.61 1.26-1.61 2.33 0 1.38 1.12 2.5 2.5 2.5.36 0 .69-.08 1-.21v7.21c0 .55-.45 1-1 1s-1-.45-1-1V14c0-1.1-.9-2-2-2h-1V5c0-1.1-.9-2-2-2H6c-1.1 0-2 .9-2 2v16h10v-7.5h1.5v5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V9c0-.69-.28-1.32-.73-1.77zM12 10H6V5h6v5zm6 0c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/></svg>
      </div>
      <div>
        <h1>LPG 충전 기록</h1>
        <div class="header-sub" id="hdr-sub">내 차량 가스 충전 관리</div>
      </div>
    </div>
    <div class="header-stats">
      <div class="h-stat"><div class="hl">총 횟수</div><div class="hv" id="hs-cnt">0<span class="hu">회</span></div></div>
      <div class="h-stat"><div class="hl">평균 단가</div><div class="hv" id="hs-avg">-<span class="hu">원/L</span></div></div>
      <div class="h-stat"><div class="hl">총 금액</div><div class="hv" id="hs-total">-<span class="hu">만원</span></div></div>
    </div>
  </div>
  <nav class="nav">
    <button class="nav-btn active" onclick="switchTab('add')">충전 입력</button>
    <button class="nav-btn" onclick="switchTab('drive')">주행 기록</button>
    <button class="nav-btn" onclick="switchTab('stats')">통계</button>
    <button class="nav-btn" onclick="switchTab('history')">내역</button>
    <button class="nav-btn" onclick="switchTab('settings')">설정</button>
  </nav>
  <div class="content">
    <div id="tab-add" class="section active">
      <div class="form-card">
        <div class="form-card-title">기본 정보</div>
        <div class="form-row">
          <div class="form-group"><label>충전 날짜</label><input type="date" id="inp-date"></div>
        </div>
        <div class="form-group">
          <label>주유소</label>
          <div class="station-tabs" id="station-tabs">
            <button class="station-tab" onclick="selectStation('E1')">E1</button>
            <button class="station-tab" onclick="selectStation('SK')">SK</button>
            <button class="station-tab" onclick="selectStation('GS')">GS</button>
            <button class="station-tab" onclick="selectStation('S-oil')">S-oil</button>
            <button class="station-tab" onclick="selectStation('현대')">현대</button>
          </div>
        </div>
        <div class="form-group"><label>메모</label><input type="text" id="inp-memo" placeholder="예) 집 근처, 할인 행사 등"></div>
      </div>
      <div class="form-card">
        <div class="form-card-title">충전 내역</div>
        <div class="form-row">
          <div class="form-group"><label>충전 금액 (원)</label><input type="number" id="inp-amount" placeholder="50000"></div>
          <div class="form-group"><label>리터당 가격 (원/L)</label><input type="number" id="inp-price" placeholder="1080" step="0.1"></div>
        </div>
        <div class="form-group"><label>충전량 (자동 계산)</label><input type="number" id="inp-liter" readonly placeholder="금액과 단가 입력 시 자동 계산"></div>
      </div>
      <button class="save-btn" onclick="saveRecord()">충전 기록 저장</button>
    </div>
    <div id="tab-drive" class="section">
      <div class="form-card">
        <div class="form-card-title">주행 기록 추가</div>
        <div class="form-group"><label>날짜</label><input type="date" id="drv-date"></div>
        <div class="form-row">
          <div class="form-group"><label>출발지</label><input type="text" id="drv-from" placeholder="예) 대전"></div>
          <div class="form-group"><label>목적지</label><input type="text" id="drv-to" placeholder="예) 서울"></div>
        </div>
        <div class="form-group"><label>주행거리 (km)</label><input type="number" id="drv-km" placeholder="예) 350" step="1"></div>
      </div>
      <button class="save-btn" onclick="saveDrive()">주행 기록 저장</button>
      <div id="drv-month-tabs" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:16px;margin-bottom:8px;"></div>
      <div id="drv-week-tabs" style="display:flex;gap:6px;margin-bottom:12px;"></div>
      <div class="history-list" id="drive-list"></div>
    </div>
    <div id="tab-stats" class="section">
      <div class="stats-grid" id="stats-grid"></div>
      <div class="stats-grid" id="drive-grid"></div>
      <div id="saving-wrap"></div>
      <div class="chart-card" id="cal-card" style="display:none;">
        <div class="chart-header"><span class="chart-title">월별 주행거리</span></div>
        <div id="drive-cal" style="padding:4px 0 8px;"></div>
      </div>
      <div class="chart-card">
        <div class="chart-header">
          <span class="chart-title" id="chart-title">리터당 가격 추이</span>
          <div class="chart-toggle">
            <button class="chart-btn active" onclick="switchChart(this,'price')">단가</button>
            <button class="chart-btn" onclick="switchChart(this,'amount')">금액</button>
            <button class="chart-btn" onclick="switchChart(this,'liter')">충전량</button>
          </div>
        </div>
        <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
      </div>
      <div class="tip-card"><div class="tip-title">절약 분석</div><div class="tip-body" id="tip-body">충전 기록이 쌓이면 절약 팁을 알려드려요.</div></div>
    </div>
    <div id="tab-history" class="section">
      <div class="history-list" id="history-list"></div>
    </div>
    <div id="tab-settings" class="section">
      <div class="form-card">
        <div class="form-card-title">☁️ GitHub 동기화</div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx"
            style="width:100%;border:1.5px solid var(--border);border-radius:12px;padding:10px 12px;font-size:13px;color:var(--text1);font-family:'Noto Sans KR',sans-serif;background:var(--bg2);outline:none;">
          <div style="display:flex;gap:8px;">
            <button class="save-btn" onclick="saveGhToken()" style="flex:1;background:var(--accent);">토큰 저장</button>
            <button class="save-btn" onclick="syncFromGitHub()" style="flex:1;background:var(--text2);">지금 불러오기</button>
          </div>
          <div id="syncStatus" style="font-size:12px;color:var(--text2);line-height:1.6;"></div>
        </div>
      </div>
      <div class="form-card">
        <div class="form-card-title">데이터 백업</div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <button class="save-btn" onclick="backupData()" style="background:var(--accent);">백업 저장 (JSON 다운로드)</button>
          <button class="save-btn" onclick="document.getElementById('restore-file').click()" style="background:var(--text2);">백업 불러오기</button>
          <input type="file" id="restore-file" accept=".json" style="display:none" onchange="restoreData(event)">
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- 주행 기록 수정 모달 -->
<div class="overlay hidden" id="drive-edit-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">주행 기록 수정</div>
    <div class="form-group"><label>날짜</label><input type="date" id="dedit-date"></div>
    <div class="form-row">
      <div class="form-group"><label>출발지</label><input type="text" id="dedit-from" placeholder="예) 대전"></div>
      <div class="form-group"><label>목적지</label><input type="text" id="dedit-to" placeholder="예) 서울"></div>
    </div>
    <div class="form-group"><label>주행거리 (km)</label><input type="number" id="dedit-km" placeholder="예) 350" step="1"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeDriveEditModal()">취소</button>
      <button class="btn-primary" onclick="saveDriveEdit()">저장</button>
    </div>
  </div>
</div>
<div class="overlay hidden" id="edit-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">충전 기록 수정</div>
    <div class="form-group"><label>충전 날짜</label><input type="date" id="edit-date"></div>
    <div class="form-group">
      <label>주유소</label>
      <div class="station-tabs" id="edit-station-tabs">
        <button class="station-tab" onclick="selectEditStation('E1')">E1</button>
        <button class="station-tab" onclick="selectEditStation('SK')">SK</button>
        <button class="station-tab" onclick="selectEditStation('GS')">GS</button>
        <button class="station-tab" onclick="selectEditStation('S-oil')">S-oil</button>
        <button class="station-tab" onclick="selectEditStation('현대')">현대</button>
      </div>
    </div>
    <div class="form-group"><label>메모</label><input type="text" id="edit-memo" placeholder="예) 집 근처"></div>
    <div class="form-row">
      <div class="form-group"><label>충전 금액 (원)</label><input type="number" id="edit-amount"></div>
      <div class="form-group"><label>리터당 가격 (원/L)</label><input type="number" id="edit-price" step="0.1"></div>
    </div>
    <div class="form-group"><label>충전량 (자동 계산)</label><input type="number" id="edit-liter" readonly style="color:var(--accent-dark);font-weight:700;background:var(--accent-light);border-color:transparent;"></div>
    <div class="form-group"><label>계기판 km (충전 직전)</label><input type="number" id="edit-odo" placeholder="예) 45230" step="1"></div>
    <div class="form-row">
      <div class="form-group"><label>출발지</label><input type="text" id="edit-from" placeholder="예) 대전"></div>
      <div class="form-group"><label>목적지</label><input type="text" id="edit-to" placeholder="예) 서울"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeEditModal()">취소</button>
      <button class="btn-primary" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>
<script>
const STORAGE_KEY='lpg_records_v3';
let records=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
let chart=null,curType='price';
let selStation='';
let editStation='';
let editId=null;

function saveData(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(records));
  githubSave();
}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}
function switchTab(t){
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',['add','drive','stats','history','settings'][i]===t));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='stats')renderStats();
  if(t==='history')renderHistory();
  if(t==='drive')renderDriveList();
  if(t==='settings'){
    const el=document.getElementById('syncStatus');
    if(el)el.textContent=getGhToken()?'✅ 토큰 설정됨 · 자동 저장 활성화':'⚠️ 토큰 없음 · 데이터가 언제든 삭제될 수 있어요';
  }
}

// ─── GITHUB 동기화 ──────────────────────────────────────────────
const GH_OWNER='beenijua',GH_REPO='lpg',GH_FILE='data/lpg-data.json';
const GH_API=`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`;
function getGhToken(){return localStorage.getItem('gh_token_lpg')||'';}

function saveGhToken(){
  const t=document.getElementById('ghToken').value.trim();
  if(!t){showToast('토큰을 입력해주세요');return;}
  localStorage.setItem('gh_token_lpg',t);
  document.getElementById('ghToken').value='';
  document.getElementById('syncStatus').textContent='✅ 토큰 저장됐어요! 지금 불러오기를 눌러보세요.';
  showToast('토큰 저장됐어요 ✅');
}

let _ghTimer=null;
async function githubSave(){
  const token=getGhToken();if(!token)return;
  clearTimeout(_ghTimer);
  _ghTimer=setTimeout(async()=>{
    try{
      const content=btoa(unescape(encodeURIComponent(JSON.stringify({records,drives,exportedAt:new Date().toISOString()}))));
      let sha='';
      try{const r=await fetch(GH_API,{headers:{Authorization:`token ${token}`}});if(r.ok){const j=await r.json();sha=j.sha;}}catch(e){}
      const body={message:'sync: lpg data',content};if(sha)body.sha=sha;
      const res=await fetch(GH_API,{method:'PUT',headers:{Authorization:`token ${token}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(res.ok){
        const now=new Date();
        const el=document.getElementById('syncStatus');
        if(el)el.textContent=`☁️ 마지막 저장: ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
      }
    }catch(e){}
  },1000);
}

async function syncFromGitHub(){
  const token=getGhToken();
  if(!token){showToast('먼저 토큰을 저장해주세요');return;}
  const el=document.getElementById('syncStatus');
  if(el)el.textContent='⏳ 불러오는 중...';
  try{
    const res=await fetch(GH_API+'?t='+Date.now(),{headers:{Authorization:`token ${token}`}});
    if(!res.ok){
      if(el)el.textContent=res.status===404?'☁️ 저장된 데이터 없음 (처음 사용)':'❌ 불러오기 실패 (토큰 확인)';
      return;
    }
    const j=await res.json();
    const data=JSON.parse(decodeURIComponent(escape(atob(j.content))));
    if(data.records){
      records=data.records;
      localStorage.setItem(STORAGE_KEY,JSON.stringify(records));
      if(data.drives){
        drives=data.drives;
        localStorage.setItem('lpg_drives',JSON.stringify(drives));
      }
      updateHeader();renderHistory();
      if(el)el.textContent=`✅ 충전 ${records.length}개, 주행 ${drives.length}개 불러왔어요!`;
      showToast(`데이터 불러왔어요 ✅`);
    }
  }catch(e){if(el)el.textContent='❌ 오류: '+e.message;}
}

function backupData(){
  const data={records,drives,exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='lpg-backup.json';a.click();
  URL.revokeObjectURL(url);showToast('백업 저장됐어요!');
}
function restoreData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.records){showToast('올바른 백업 파일이 아니에요');return;}
      if(!confirm('현재 데이터를 백업으로 교체할까요?'))return;
      records=data.records;
      localStorage.setItem(STORAGE_KEY,JSON.stringify(records));
      if(data.drives){
        drives=data.drives;
        localStorage.setItem('lpg_drives',JSON.stringify(drives));
      }
      updateHeader();showToast('복원 완료! (충전 '+records.length+'개, 주행 '+(drives.length)+'개)');
    }catch{showToast('파일을 읽을 수 없어요');}
  };
  reader.readAsText(file);e.target.value='';
}

let drives=JSON.parse(localStorage.getItem('lpg_drives')||'[]');
function saveDrives(){localStorage.setItem('lpg_drives',JSON.stringify(drives));githubSaveDrives();}

function saveDrive(){
  const date=document.getElementById('drv-date').value;
  const from=document.getElementById('drv-from').value.trim();
  const to=document.getElementById('drv-to').value.trim();
  const km=parseFloat(document.getElementById('drv-km').value);
  if(!date||!km){showToast('날짜와 주행거리를 입력해주세요');return;}
  drives.unshift({id:Date.now(),date,from,to,km});
  saveDrives();
  ['drv-from','drv-to','drv-km'].forEach(id=>document.getElementById(id).value='');
  renderDriveList();showToast('주행 기록이 저장됐어요!');

let drvSelMonth='';
let drvSelWeek=1;

function getWeekOfMonth(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  return Math.ceil(d.getDate()/7);
}

function renderDriveList(){
  if(!drives.length){
    document.getElementById('drv-month-tabs').innerHTML='';
    document.getElementById('drv-week-tabs').innerHTML='';
    document.getElementById('drive-list').innerHTML='<div class="empty">아직 주행 기록이 없어요.</div>';
    return;
  }

  // 월 목록 추출
  const months=[...new Set(drives.map(d=>d.date.slice(0,7)))].sort((a,b)=>b.localeCompare(a));
  if(!drvSelMonth||!months.includes(drvSelMonth)) drvSelMonth=months[0];

  // 월 탭 렌더
  const mTabEl=document.getElementById('drv-month-tabs');
  mTabEl.innerHTML=months.map(m=>{
    const [y,mo]=m.split('-');
    const active=m===drvSelMonth;
    return `<button onclick="drvSelMonth='${m}';drvSelWeek=1;renderDriveList();"
      style="padding:6px 14px;border-radius:20px;border:1.5px solid ${active?'var(--accent)':'var(--border)'};
      background:${active?'var(--accent)':'transparent'};color:${active?'white':'var(--text2)'};
      font-size:12px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">
      ${parseInt(mo)}월
    </button>`;
  }).join('');

  // 선택된 월의 주행 기록
  const monthDrives=drives.filter(d=>d.date.slice(0,7)===drvSelMonth)
    .sort((a,b)=>new Date(a.date)-new Date(b.date));

  // 주차 목록 추출
  const weeks=[...new Set(monthDrives.map(d=>getWeekOfMonth(d.date)))].sort((a,b)=>a-b);
  if(!weeks.includes(drvSelWeek)) drvSelWeek=weeks[0];

  // 주차 탭 렌더
  const wTabEl=document.getElementById('drv-week-tabs');
  wTabEl.innerHTML=weeks.map(w=>{
    const active=w===drvSelWeek;
    return `<button onclick="drvSelWeek=${w};renderDriveList();"
      style="padding:5px 12px;border-radius:20px;border:1.5px solid ${active?'var(--accent-dark)':'var(--border)'};
      background:${active?'var(--accent-light)':'transparent'};color:${active?'var(--accent-dark)':'var(--text2)'};
      font-size:12px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">
      ${w}주차
    </button>`;
  }).join('');

  // 해당 주차 기록
  const weekDrives=monthDrives.filter(d=>getWeekOfMonth(d.date)===drvSelWeek);
  const totalKm=weekDrives.reduce((s,d)=>s+d.km,0);

  const listEl=document.getElementById('drive-list');
  if(!weekDrives.length){listEl.innerHTML='<div class="empty">이 주차에 기록이 없어요.</div>';return;}

  listEl.innerHTML=weekDrives.map(d=>`
    <div class="h-item">
      <div class="h-left">
        ${(d.from||d.to)?`<div class="station">${d.from||'?'} → ${d.to||'?'}</div>`:'<div class="station">주행 기록</div>'}
        <div class="date">${d.date}</div>
      </div>
      <div class="h-right">
        <div class="amount">${d.km.toLocaleString()}<span style="font-size:12px;font-weight:400;color:var(--text2);">km</span></div>
      </div>
      <div class="h-actions">
        <button class="edit-btn" onclick="openDriveEditModal(${d.id})">✏️</button>
        <button class="del-btn" onclick="delDrive(${d.id})">✕</button>
      </div>
    </div>`).join('')
  +`<div style="background:var(--accent-light);border-radius:12px;padding:10px 14px;display:flex;justify-content:space-between;margin-top:4px;">
      <div style="font-size:12px;color:var(--accent-dark);font-weight:600;">${drvSelWeek}주차 합계</div>
      <div style="font-size:14px;font-weight:700;color:var(--accent-dark);">${totalKm.toLocaleString()}km</div>
    </div>`;
}

function delDrive(id){

function renderHistory(){
  const el=document.getElementById('history-list');
  if(!records.length){el.innerHTML='<div class="empty">아직 충전 기록이 없어요.<br>첫 번째 충전을 기록해보세요!</div>';return;}

  const sorted=[...records].sort((a,b)=>new Date(a.date)-new Date(b.date));

  const cards=sorted.map((r,i)=>{
    const nextCharge=sorted[i+1];
    const relatedDrives=drives.filter(d=>{
      if(d.date < r.date) return false;
      if(nextCharge && d.date >= nextCharge.date) return false;
      return true;
    }).sort((a,b)=>new Date(a.date)-new Date(b.date));
    return {record:r, relatedDrives};
  });

  cards.reverse();

  let html='';let lastMonth='';
  cards.forEach(({record:r, relatedDrives},i)=>{
    const m=r.date.slice(0,7);
    if(m!==lastMonth){const[y,mo]=m.split('-');html+=`<div class="month-label">${y}년 ${parseInt(mo)}월</div>`;lastMonth=m;}

    const prev=cards[i+1]?.record;
    let badge='';
    if(prev){const diff=r.pricePerL-prev.pricePerL;if(diff>0.5)badge=`<span class="badge badge-up">▲${diff.toFixed(1)}</span>`;else if(diff<-0.5)badge=`<span class="badge badge-dn">▼${Math.abs(diff).toFixed(1)}</span>`;}

    const hasDrives=relatedDrives.length>0;
    const totalKm=hasDrives?relatedDrives.reduce((s,d)=>s+d.km,0):0;
    const did='drv-'+r.id;

    let driveHTML='';
    if(hasDrives){
      driveHTML=`<div id="${did}" style="display:none;width:100%;margin-top:10px;padding-top:10px;border-top:1.5px dashed var(--border);">
        ${relatedDrives.map(d=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);">
            <div style="font-size:12px;color:var(--text2);">${d.date.slice(5).replace('-','/')}${(d.from||d.to)?` &nbsp;${d.from||'?'} → ${d.to||'?'}`:''}</div>
            <div style="font-size:13px;font-weight:700;color:var(--accent);">${d.km.toLocaleString()}km</div>
          </div>`).join('')}
        <div style="display:flex;justify-content:space-between;padding-top:7px;">
          <div style="font-size:11px;color:var(--text3);">이 충전으로 총</div>
          <div style="font-size:12px;font-weight:700;color:var(--accent-dark);">${totalKm.toLocaleString()}km 주행</div>
        </div>
      </div>`;
    }

    const cardAttr=hasDrives?`onclick="toggleDrive('${did}',this)" style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-start;cursor:pointer;"`:
      `style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-start;"`;

    html+=`<div ${cardAttr}>      <div class="h-left" style="flex:1;">
        <div class="station">${r.station}</div>
        ${r.memo?`<div class="memo">${r.memo}</div>`:''}
        <div class="date">${r.date}</div>
      </div>
      <div class="h-right">
        <div class="amount">${r.amount.toLocaleString()}원${badge}</div>
        <div class="detail">${r.liter.toFixed(1)}L 충전</div>
        <div class="pprice">${r.pricePerL.toFixed(1)}원/L</div>
      </div>
      <div class="h-actions">
        ${hasDrives?`<span class="arr" style="font-size:18px;color:var(--accent);margin-right:4px;">›</span>`:''}
        <button class="edit-btn" onclick="event.stopPropagation();openEditModal(${r.id})">✏️</button>
        <button class="del-btn" onclick="event.stopPropagation();delRecord(${r.id})">✕</button>
      </div>
      ${driveHTML}
    </div>`;
  });
  el.innerHTML=html;
}
function toggleDrive(id, card){
  const el=document.getElementById(id); if(!el) return;
  const open=el.style.display!=='none';
  el.style.display=open?'none':'block';
  const arr=card.querySelector('.arr');
  if(arr) arr.textContent=open?'›':'‹';
}

function delRecord(id){if(!confirm('이 기록을 삭제할까요?'))return;records=records.filter(r=>r.id!==id);saveData();updateHeader();renderHistory();showToast('삭제됐어요');}
function renderStats(){
  const now=new Date();
  const thisM=records.filter(r=>{const d=new Date(r.date);return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();});
  const amtM=thisM.reduce((s,r)=>s+r.amount,0);
  const totalL=records.reduce((s,r)=>s+r.liter,0);
  const avgP=records.length?records.reduce((s,r)=>s+r.pricePerL,0)/records.length:0;
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-card accent"><div class="lbl">이번달 충전 횟수</div><div class="val">${thisM.length}<span class="unit">회</span></div></div>
    <div class="stat-card"><div class="lbl">이번달 총 금액</div><div class="val">${(amtM/10000).toFixed(1)}<span class="unit">만원</span></div></div>
    <div class="stat-card"><div class="lbl">평균 단가</div><div class="val">${Math.round(avgP)}<span class="unit">원/L</span></div></div>
    <div class="stat-card"><div class="lbl">전체 충전량</div><div class="val">${Math.round(totalL)}<span class="unit">L</span></div></div>`;
  if(drives.length){
    const totalKm=drives.reduce((s,d)=>s+d.km,0);
    const avgKm=Math.round(totalKm/drives.length);
    const avgKmL=totalL>0?(totalKm/totalL).toFixed(1):'-';
    document.getElementById('drive-grid').innerHTML=`
      <div class="stat-card"><div class="lbl">총 주행거리</div><div class="val">${totalKm.toLocaleString()}<span class="unit">km</span></div></div>
      <div class="stat-card accent"><div class="lbl">평균 연비</div><div class="val">${avgKmL}<span class="unit">km/L</span></div></div>
      <div class="stat-card"><div class="lbl">평균 주행거리</div><div class="val">${avgKm}<span class="unit">km</span></div></div>`;
    const saved=Math.round((1700-avgP)*totalL);
    document.getElementById('saving-wrap').innerHTML=`<div class="tip-card"><div class="tip-title">💰 휘발유 대비 절약액</div><div class="tip-body">LPG 평균 <strong>${Math.round(avgP)}원/L</strong> vs 휘발유 1,700원/L<br>총 <strong>${(saved/10000).toFixed(1)}만원</strong> 절약했어요! 🎉</div></div>`;
    const monthly={};
    drives.forEach(d=>{const m=d.date.slice(0,7);if(!monthly[m])monthly[m]=0;monthly[m]+=d.km;});
    const months=Object.entries(monthly).sort((a,b)=>a[0].localeCompare(b[0]));
    const maxKm=Math.max(...months.map(m=>m[1]));
    document.getElementById('cal-card').style.display='block';
    document.getElementById('drive-cal').innerHTML=months.map(([m,km])=>{
      const mo=parseInt(m.split('-')[1]);
      const pct=Math.round(km/maxKm*100);
      return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
        <div style="font-size:11px;color:var(--text2);width:28px;flex-shrink:0;">${mo}월</div>
        <div style="flex:1;background:var(--surface2);border-radius:4px;height:20px;overflow:hidden;">
          <div style="height:100%;width:${pct}%;background:var(--accent);border-radius:4px;display:flex;align-items:center;padding-left:7px;min-width:44px;">
            <span style="font-size:10px;color:white;font-weight:700;">${km.toLocaleString()}km</span>
          </div>
        </div>
      </div>`;
    }).join('');
  } else {
    document.getElementById('drive-grid').innerHTML='';
    document.getElementById('saving-wrap').innerHTML='';
    document.getElementById('cal-card').style.display='none';
  }
  renderChart(curType);
  if(records.length>=2){
    const prices=records.map(r=>r.pricePerL);
    const min=Math.min(...prices),max=Math.max(...prices);
    const best=records.find(r=>r.pricePerL===min);
    const worst=records.find(r=>r.pricePerL===max);
    document.getElementById('tip-body').innerHTML=`최저가: <strong>${min.toFixed(1)}원/L</strong> — ${best.station} (${best.date})<br>최고가: <strong>${max.toFixed(1)}원/L</strong> — ${worst.station} (${worst.date})<br>최저가 주유소만 이용하면 1회 평균 <strong>${Math.round((max-min)*47)}원</strong> 절약 가능해요!`;
  }
}
function switchChart(btn,type){curType=type;document.querySelectorAll('.chart-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');const titles={price:'리터당 가격 추이',amount:'충전 금액 추이',liter:'충전량 추이'};document.getElementById('chart-title').textContent=titles[type];renderChart(type);}
function renderChart(type){if(!records.length)return;const sorted=[...records].sort((a,b)=>new Date(a.date)-new Date(b.date));const labels=sorted.map(r=>r.date.slice(5));const data=sorted.map(r=>type==='price'?parseFloat(r.pricePerL.toFixed(1)):type==='amount'?r.amount:parseFloat(r.liter.toFixed(1)));const colors={price:'#1D9E75',amount:'#378ADD',liter:'#BA7517'};const c=colors[type];if(chart)chart.destroy();chart=new Chart(document.getElementById('mainChart'),{type:'line',data:{labels,datasets:[{data,borderColor:c,backgroundColor:c+'18',fill:true,tension:0.38,pointBackgroundColor:c,pointRadius:4,pointHoverRadius:6,borderWidth:2.5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{const v=ctx.parsed.y;if(type==='price')return `${v.toFixed(1)}원/L`;if(type==='amount')return `${v.toLocaleString()}원`;return `${v.toFixed(1)}L`;}}}},scales:{x:{grid:{display:false},ticks:{font:{size:11},color:'#a0a59e',autoSkip:false,maxRotation:45}},y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{size:11},color:'#a0a59e'}}}}});}
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/lpg/sw.js',{scope:'/lpg/'}));}
// 토큰 있으면 자동으로 GitHub에서 불러오기
if(getGhToken()){syncFromGitHub();}else{updateHeader();}
</script>
</body>
